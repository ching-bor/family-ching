<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<title>My Family — 家庭照护记录</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f5f0e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Family">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-192.png">
<link rel="apple-touch-icon" sizes="167x167" href="icon-192.png">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<style>
:root{--bg:#f5f0e8;--card:#faf7f2;--green:#7a9e5a;--grnlt:rgba(122,158,90,.1);--orange:#c8964a;--orlt:rgba(200,150,74,.1);--txt:#2c2416;--sub:#8a7d68;--box:rgba(44,36,22,.03);--rld:18px;--rmd:14px;--rsm:10px;--sd:0 1px 4px rgba(44,36,22,.06),0 2px 8px rgba(44,36,22,.04);--sdn:0 4px 16px rgba(44,36,22,.1);--glass:1px solid rgba(44,36,22,.08)}
*{margin:0;padding:0;box-sizing:border-box;font-family:"PingFang SC","苹方","Helvetica Neue","Josefin Sans",sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:110px;overflow-x:hidden;letter-spacing:.01em}
.wrap{max-width:480px;margin:0 auto;padding:20px}
.header{text-align:center;margin:40px 0 32px}
.header h1{font-size:26px;font-weight:600;letter-spacing:8px;color:var(--txt);opacity:.4;display:inline;font-family:"Josefin Sans",sans-serif;text-transform:uppercase}
.bref{width:36px;height:36px;background:var(--card);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:var(--sd);border:var(--glass);cursor:pointer;color:var(--green);transition:transform .2s}
.bref:active{transform:scale(.9)}
.scard{background:var(--card);border:var(--glass);border-radius:var(--rld);padding:28px;box-shadow:var(--sd);margin-bottom:20px}
.shd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.shd h2{font-size:22px;font-weight:700;margin-bottom:4px;letter-spacing:.02em;font-family:"Josefin Sans",sans-serif}
.sdate{color:var(--sub);font-size:13px;font-weight:400;letter-spacing:.02em}
.pc{height:3px;background:rgba(44,36,22,.06);border-radius:2px;margin:20px 0;overflow:hidden}
.pf{height:100%;background:var(--green);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat{background:transparent;border:1px solid rgba(44,36,22,.08);border-radius:var(--rmd);padding:16px 12px;display:flex;flex-direction:column;transition:all .2s}
.stat.cp{cursor:pointer}.stat.cp:hover{background:rgba(44,36,22,.03)}.stat.cp:active{transform:scale(.98)}
.sv{font-size:24px;font-weight:700;margin-bottom:6px;line-height:1;letter-spacing:-.01em;color:var(--txt);font-family:"Josefin Sans",sans-serif}
.sl{font-size:11px;color:var(--sub);font-weight:400;letter-spacing:.02em}
.flts{display:flex;gap:10px;overflow-x:auto;padding-bottom:10px;margin-bottom:14px;scrollbar-width:none}
.flts::-webkit-scrollbar{display:none}
.pill{padding:7px 16px;background:var(--card);border:1px solid rgba(44,36,22,.1);border-radius:20px;font-size:13px;font-weight:500;color:var(--sub);cursor:pointer;white-space:nowrap;transition:all .2s}
.pill.act{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 2px 8px rgba(122,158,90,.2)}
.ms{display:flex;flex-direction:column;gap:20px}
.mc{background:var(--card);border:var(--glass);border-radius:var(--rld);padding:24px;box-shadow:var(--sd)}
.mhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.minfo{display:flex;align-items:center;gap:12px}
.mava{width:40px;height:40px;background:var(--orlt);color:var(--orange);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600}
.mname{font-size:18px;font-weight:600;letter-spacing:.01em;font-family:"Josefin Sans",sans-serif}.mst{font-size:12px;color:var(--sub);margin-top:2px;font-weight:400}
.bg{background:var(--orlt);color:var(--orange);padding:2px 8px;border-radius:8px;font-size:12px;font-weight:500;letter-spacing:.02em}
.tl{display:flex;flex-direction:column;gap:0;border-top:1px solid rgba(44,36,22,.07);margin-top:4px}
.ti{display:flex;align-items:center;padding:12px 14px;background:transparent;border:none;border-bottom:1px solid rgba(44,36,22,.07);border-radius:0;transition:all .2s}
.ti.pinned{border-bottom:1px solid rgba(44,36,22,.07);background:rgba(122,158,90,.05)}
.ti.done{background:transparent;opacity:.55}

.tbody{flex:1}.ttit{font-size:14px;font-weight:500;margin-bottom:3px;letter-spacing:.01em;color:var(--txt)}.ttime{font-size:12px;color:var(--sub);font-weight:400;letter-spacing:.01em}
.tacts{display:flex;gap:2px;padding-right:2px}.tacts button{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:6px;display:flex;align-items:center;font-size:12px;font-weight:500}
.abtn{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;background:rgba(122,158,90,.05);border:1px dashed rgba(122,158,90,.3);border-radius:var(--rsm);font-size:14px;font-weight:500;color:var(--green);cursor:pointer;margin-top:16px;width:100%;transition:all .2s;letter-spacing:.02em}
.abtn:active{transform:scale(.98)}
.login-btn{padding:6px 14px;background:var(--card);border:var(--glass);border-radius:16px;font-size:12px;font-weight:500;color:var(--green);cursor:pointer;white-space:nowrap;transition:all .2s;box-shadow:var(--sd)}
.login-btn.on{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 2px 8px rgba(122,158,90,.15)}
.drag-handle{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;cursor:grab;color:var(--sub);font-size:16px;user-select:none;touch-action:none;flex-shrink:0;opacity:.5}
.drag-handle:active{cursor:grabbing;background:rgba(0,0,0,.03);opacity:1}
.mc.dragging{opacity:.85;transform:scale(1.02);box-shadow:0 8px 32px rgba(44,36,22,.1)}
.mc.drag-placeholder{border:2px dashed var(--green);background:rgba(122,158,90,.04);opacity:.5}
.ovr{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(44,36,22,.3);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:600;display:none;align-items:flex-end;justify-content:center}
.ovr.show{display:flex}
.sht{background:var(--bg);border-radius:24px 24px 0 0;padding:32px 24px 44px;width:100%;max-width:480px;animation:su .35s cubic-bezier(.4,0,.2,1);position:relative;box-shadow:0 -4px 24px rgba(44,36,22,.1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.shtt{font-size:17px;font-weight:600;margin-bottom:24px;text-align:center;letter-spacing:.05em;font-family:"Josefin Sans",sans-serif;color:var(--txt)}
.shx{position:absolute;top:20px;right:20px;background:none;border:none;font-size:22px;color:var(--sub);cursor:pointer;opacity:.5}
.fg{margin-bottom:20px}.fg label{display:block;font-size:12px;font-weight:500;margin-bottom:8px;color:var(--sub);text-transform:uppercase;letter-spacing:.8px}
.fg input{width:100%;background:rgba(44,36,22,.02);border:1px solid rgba(44,36,22,.1);padding:12px 14px;border-radius:10px;font-size:15px;font-weight:400;outline:none;color:var(--txt);transition:border-color .2s,box-shadow .2s}
.er{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.er span{font-size:22px;padding:6px 8px;background:rgba(0,0,0,.03);border-radius:10px;cursor:pointer;transition:all .15s}
.er span:hover{background:rgba(52,199,89,.08);transform:scale(1.12)}
.btng{width:100%;background:var(--green);color:#fff;border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;box-shadow:0 2px 8px rgba(122,158,90,.2);letter-spacing:.05em;transition:all .2s}
.btng:active{transform:scale(.98);opacity:.9}
.toast{position:fixed;top:-60px;left:50%;transform:translateX(-50%);background:var(--txt);color:var(--bg);padding:10px 22px;border-radius:20px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(44,36,22,.15);z-index:1000;transition:top .4s cubic-bezier(.4,0,.2,1);white-space:nowrap;letter-spacing:.02em}
.toast.show{top:30px}
.ibnr{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--card);border-radius:var(--rmd);padding:16px 20px;box-shadow:0 4px 20px rgba(44,36,22,.1);z-index:200;display:none;align-items:center;gap:12px;max-width:90%;border:var(--glass)}
.ibnr.show{display:flex}.ibnrt{flex:1;font-size:14px;font-weight:600}
.ibnrb{background:var(--green);color:#fff;border:none;padding:8px 16px;border-radius:16px;font-size:12px;font-weight:500;cursor:pointer}
.ibnrx{background:none;border:none;font-size:18px;color:var(--sub);cursor:pointer}
.sp{position:fixed;top:0;left:100%;width:100%;height:100%;background:var(--bg);z-index:500;transition:left .4s cubic-bezier(.4,0,.2,1);overflow-y:auto}
.sp.show{left:0}.spc{max-width:480px;margin:0 auto;padding:30px 20px 60px}
.sphd{display:flex;align-items:center;margin-bottom:24px}
.bkb{background:none;border:none;font-size:15px;color:var(--green);font-weight:500;cursor:pointer;letter-spacing:.02em}
.mli{background:var(--card);border:var(--glass);border-radius:var(--rmd);padding:16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;box-shadow:var(--sd);cursor:pointer;transition:all .2s}
.mli.sel{border-color:var(--green);background:rgba(122,158,90,.05);box-shadow:0 0 0 2px rgba(122,158,90,.1)}
.cs{background:var(--card);border:var(--glass);border-radius:var(--rld);padding:24px;box-shadow:var(--sd);margin-bottom:20px}
.ct{font-size:16px;font-weight:600;margin-bottom:18px;letter-spacing:.02em;font-family:"Josefin Sans",sans-serif}
.br{display:flex;align-items:center;margin-bottom:16px}
.blb{width:70px;font-size:14px;font-weight:700;text-align:right;padding-right:12px;flex-shrink:0}
.btk{flex:1;height:28px;background:rgba(44,36,22,.05);border-radius:8px;overflow:hidden;position:relative}
.bf{height:100%;border-radius:8px;background:var(--green);transition:width .6s;display:flex;align-items:center;justify-content:flex-end;padding-right:10px}
.bft{font-size:12px;font-weight:600;color:#fff}
.bpct{position:absolute;right:10px;top:0;height:100%;display:flex;align-items:center;font-size:12px;font-weight:700;color:var(--sub)}
.csm{display:flex;gap:12px;margin-top:18px}
.csmi{flex:1;background:rgba(44,36,22,.025);border:1px solid rgba(44,36,22,.07);border-radius:var(--rmd);padding:16px;text-align:center}
.csmv{font-size:22px;font-weight:700;color:var(--green);font-family:"Josefin Sans",sans-serif;letter-spacing:-.01em}.csml{font-size:11px;color:var(--sub);font-weight:400;margin-top:4px;letter-spacing:.02em}
.nw{position:fixed;bottom:30px;left:0;width:100%;display:flex;justify-content:center;z-index:100;pointer-events:none}
.nav{background:rgba(250,247,242,.92);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);padding:12px 36px;border-radius:32px;display:flex;gap:56px;box-shadow:0 2px 16px rgba(44,36,22,.08),0 0 0 1px rgba(44,36,22,.05);pointer-events:auto}
.ni{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--sub);cursor:pointer}.ni.act{color:var(--green)}
.ni svg{width:22px;height:22px}.ni span{font-size:11px;font-weight:500;letter-spacing:.02em}
/* 日历按钮 */
.calbtn{background:var(--card);border:var(--glass);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;font-weight:300;transition:all .2s;flex-shrink:0;box-shadow:var(--sd)}
.calbtn:active{transform:scale(.9);background:rgba(0,0,0,.04)}
/* 筛选器切换按钮 */
.flt-toggle{background:var(--card);border:var(--glass);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;font-weight:300;color:rgba(44,36,22,.25);transition:all .2s;flex-shrink:0;margin-left:8px;line-height:1;padding:0;box-shadow:var(--sd)}
.flt-toggle:active{transform:scale(.9);background:rgba(0,0,0,.04)}
.flt-toggle.on{color:var(--green)}
/* 筛选器面板 */
.flt-panel{max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease,margin .35s ease}
.flt-panel.show{max-height:120px}
.flt-panel-inner{display:flex;gap:10px;flex-wrap:wrap;padding-top:16px}
/* 日历页 */
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
.caldayh{font-size:11px;font-weight:700;color:var(--sub);padding:8px 0}
.calday{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;font-size:14px;font-weight:600;cursor:default;position:relative;color:var(--txt)}
.calday.today{background:rgba(122,158,90,.12);color:var(--green);font-weight:700}
.calday.empty{color:rgba(0,0,0,.04)}
.caldot{width:6px;height:6px;border-radius:50%;margin-top:2px}
.caldot.green{background:var(--green)}
.caldot.orange{background:var(--orange)}
.caldot.gray{background:rgba(0,0,0,.06)}
.calnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.calmon{font-size:17px;font-weight:600;font-family:"Josefin Sans",sans-serif}
.calarr{background:var(--card);border:var(--glass);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--sub);transition:all .2s;box-shadow:var(--sd)}
.calarr:active{transform:scale(.92)}
/* 搜索栏 */
.search-bar{display:flex;align-items:center;background:var(--card);border-radius:12px;padding:0 8px 0 16px;margin-bottom:20px;box-shadow:var(--sd);border:var(--glass)}
.search-bar input{flex:1;background:none;border:none;outline:none;color:var(--sub);font-size:13px;font-weight:400;padding:14px 0;font-family:inherit;letter-spacing:.02em}
.search-bar input::placeholder{color:rgba(44,36,22,.2);font-weight:400;font-style:italic}
.search-btn{width:36px;height:36px;border-radius:8px;background:rgba(44,36,22,.04);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--sub);transition:all .2s;flex-shrink:0}
.search-btn svg{width:16px;height:16px}
.search-btn:active{background:rgba(44,36,22,.08)}
/* 装饰线 */
.header-sep{width:36px;height:1px;background:var(--orange);opacity:.4;margin:10px auto 0;display:block}
/* 子页面标题衬线 */
.sphd-title{flex:1;text-align:center;font-size:18px;font-weight:600;margin-right:40px;font-family:"Josefin Sans",sans-serif;letter-spacing:.05em}
/* 底部导航点 */
.ni-dot{width:4px;height:4px;border-radius:50%;background:var(--green);margin:0 auto;display:none}
.ni.act .ni-dot{display:block}
</style>
</head>
<body>

<div id="toast" class="toast"></div>
<div class="ibnr" id="ibnr"><div class="ibnrt">安装到主屏幕，像 App 一样使用</div><button class="ibnrb" id="ibnrBtn">安装</button><button class="ibnrx" id="ibnrX">&times;</button></div>

<div class="wrap">
<div class="header"><h1>TODAY NOTE</h1><span class="header-sep"></span><div style="margin-top:8px;font-size:12px;color:var(--sub);letter-spacing:2px;font-weight:400">记录点滴 · 关爱家人</div></div>

<div class="scard">
<div class="shd"><div><h2>My Family</h2><div class="sdate" id="curDate"></div></div><div style="display:flex;align-items:center;gap:8px"><button class="flt-toggle" id="fltToggle" onclick="toggleFilterPanel()" title="筛选">+</button><button class="calbtn" onclick="openCalendarPage()" title="日历记录"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(44,36,22,.3)" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></button></div></div>
<div class="pc"><div class="pf" id="progBar" style="width:0%"></div></div>
<div class="stats">
<div class="stat cp" onclick="openMemberPage()"><div style="margin-bottom:12px;color:var(--green)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><div class="sv" id="stM">0</div><div class="sl">成员管理 ⟩</div></div>
<div class="stat"><div style="margin-bottom:12px;color:var(--green)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><div class="sv" id="stD">0</div><div class="sl">今日完成</div></div>
<div class="stat cp" onclick="doSync()"><div style="margin-bottom:12px;color:var(--orange)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg></div><div class="sv" id="stS">0</div><div class="sl">待同步 ⟳</div></div>
</div>
<div class="flt-panel" id="fltPanel"><div class="flt-panel-inner" id="fltPanelInner"></div></div>
</div>

<div class="search-bar"><input type="text" id="searchInput" placeholder="Less is more ..." readonly><button class="search-btn" onclick="shuffleQuote()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button></div>

<div class="ms" id="memberBox"></div>
</div>

<!-- 任务弹窗 -->
<div class="ovr" id="taskOv">
<div class="sht">
<button class="shx" onclick="closeTaskModal()">&times;</button>
<div class="shtt" id="taskTit">添加内容</div>
<input type="hidden" id="tmMid"><input type="hidden" id="tmTid">
<div class="fg"><label>任务</label><input type="text" id="tmName" placeholder=""></div>
<div class="fg"><label>备注</label><input type="text" id="tmNote" placeholder="小字备注，可不填"></div>
<button class="btng" onclick="saveTask()">保存</button>
</div>
</div>

<!-- 提醒弹窗 -->
<div class="ovr" id="remOv">
<div class="sht">
<button class="shx" onclick="closeRemModal()">&times;</button>
<div class="shtt">设置提醒</div>
<input type="hidden" id="rmMid">
<input type="hidden" id="rmTid">
<div class="fg"><label>提醒时间</label><input type="time" id="rmTime"></div>
<button class="btng" onclick="saveReminder()">设置提醒</button>
</div>
</div>

<!-- 成员管理页 -->
<div class="sp" id="memberPage">
<div class="spc">
<div class="sphd"><button class="bkb" onclick="closeMemberPage()">⟨ 返回</button><div class="sphd-title">成员管理</div></div>
<div id="mlBox"></div>
<div style="margin-top:20px">
<h3 style="font-size:14px;font-weight:600;margin-bottom:12px;color:var(--sub);letter-spacing:.5px;text-transform:uppercase">编辑成员</h3>
<div id="editCard" style="background:var(--card);border:1px solid rgba(0,0,0,.04);border-radius:var(--rld);padding:24px;box-shadow:var(--sd);display:none">
<input type="hidden" id="emId">
<div class="fg"><label>姓名</label><input type="text" id="emName"></div>
<div class="fg"><label>关于</label><input type="text" id="emStatus"></div>
<button class="btng" onclick="saveMemEdit()">确认保存</button>
</div>
</div>
</div>
</div>

<!-- 家庭图表页 -->
<div class="sp" id="familyPage">
<div class="spc">
<div class="sphd"><button class="bkb" onclick="closeFamilyPage()">⟨ 返回</button><div class="sphd-title">家庭总览</div></div>
<div class="cs">
<div class="ct">任务完成统计</div>

<script>
/* PWA */
var _dp = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  _dp = e;
  document.getElementById('ibnr').classList.add('show');
});
document.getElementById('ibnrBtn').addEventListener('click', function() {
  if (_dp) {
    _dp.prompt();
    _dp.userChoice.then(function(r) {
      if (r.outcome === 'accepted') document.getElementById('ibnr').classList.remove('show');
      _dp = null;
    });
  }
});
document.getElementById('ibnrX').addEventListener('click', function() {
  document.getElementById('ibnr').classList.remove('show');
});
window.addEventListener('appinstalled', function() {
  document.getElementById('ibnr').classList.remove('show');
});
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('service-worker.js');
  });
}

/* 数据 */
var DEF = {
  members: [
    {id:'m1', name:'秦闻达', status:'', tasks:[]},
    {id:'m2', name:'孙传兰', status:'', tasks:[]},
    {id:'m3', name:'秦佳晗', status:'', tasks:[]}
  ]
};

var data = {};
var filter = 'all';
var selMid = null;
var editModeMid = null;
var tidCnt = 100;

function genTid() { tidCnt++; return 't' + tidCnt; }

/* 步数追踪 */
function getStepKey() {
  var d = new Date();
  return 'fc_steps_' + d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
}
function getTodaySteps() { return parseInt(localStorage.getItem(getStepKey()) || '0'); }
function updateTodaySteps(mid, tid) {
  var cur = getTodaySteps();
  var v = prompt('输入今天步数（目前：' + cur + '步）', cur || '');
  if (v === null) return;
  var n = parseInt(v, 10);
  if (isNaN(n) || n < 0) { alert('请输入有效数字'); return; }
  localStorage.setItem(getStepKey(), String(n));
  render();
  toast('步数已更新');
}

function todayStr() {
  var d = new Date();
  var w = ['周日','周一','周二','周三','周四','周五','周六'];
  var m = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  return w[d.getDay()] + ', ' + m[d.getMonth()] + ' ' + d.getDate();
}

function nowT() {
  var d = new Date();
  return ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
}

function save() {
  localStorage.setItem('fc_v4', JSON.stringify(data));
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

/* 随机格言 */
var quotes = [
  '为平凡亦能发光，坚持终抵理想远方',
  '不惧世间风浪，以热忱奔赴万丈光芒',
  '步履不停追光，岁月不负努力之人',
  '心中常驻暖阳，再难也能逆风生长',
  '前路浩荡，未来皆亮',
  '心若澄澈明亮，所见皆是温柔风景',
  '不纠结过往遗憾，满心期待明日晨光',
  '少怨世事不如意，多寻人间小美好',
  '慢下来治愈自己，生活自有小惊喜',
  '凡事向好，自在心安',
  '允许一切发生，从容与生活和解',
  '心宽一寸，路宽一丈',
  '看淡得失，尽享清欢'
];
var quoteIdx = -1;
function shuffleQuote() {
  var i;
  do { i = Math.floor(Math.random() * quotes.length); } while (i === quoteIdx && quotes.length > 1);
  quoteIdx = i;
  document.getElementById('searchInput').value = quotes[i];
}

/* 初始化 */
function init() {
  loggedIn = localStorage.getItem('fc_login') === '1';
  var s = localStorage.getItem('fc_v4');
  if (s) {
    data = JSON.parse(s);
  } else {
    data = JSON.parse(JSON.stringify(DEF));
  }
  document.getElementById('curDate').innerText = todayStr();
  shuffleQuote();
  setInterval(shuffleQuote, 3000);
  render();
}

function resetData() {
  if (!confirm('确定重置今日所有记录？')) return;
  data.members.forEach(function(m) {
    m.tasks.forEach(function(t) {
      t.isDone = false;
      t.time = '';
      t.synced = false;
    });
  });
  save();
  render();
  toast('已重置');
}

/* 渲染 */
function render() {
  document.getElementById('stM').innerText = data.members.length;
  var tAll = 0, tDone = 0, tSync = 0;
  data.members.forEach(function(m) {
    if (filter === 'all' || filter === m.id) {
      m.tasks.forEach(function(t) {
        tAll++;
        if (t.isDone) tDone++;
        if (t.isDone && !t.synced) tSync++;
      });
    }
  });
  document.getElementById('stD').innerText = tDone;
  document.getElementById('stS').innerText = tSync;
  document.getElementById('progBar').style.width = (tAll === 0 ? '0%' : (tDone / tAll * 100) + '%');
  renderFilters();
  renderMembers();
  saveTodayHistory();
}

var showFilterPanel = false;

function toggleFilterPanel() {
  showFilterPanel = !showFilterPanel;
  var panel = document.getElementById('fltPanel');
  var btn = document.getElementById('fltToggle');
  if (showFilterPanel) {
    panel.classList.add('show');
    btn.classList.add('on');
    btn.textContent = '\u2212';
  } else {
    panel.classList.remove('show');
    btn.classList.remove('on');
    btn.textContent = '+';
  }
}

function renderFilters() {
  var c = document.getElementById('fltPanelInner');
  var h = '<button class="pill ' + (filter === 'all' ? 'act' : '') + '" onclick="setFilter(\'all\')">全部</button>';
  data.members.forEach(function(m) {
    h += '<button class="pill ' + (filter === m.id ? 'act' : '') + '" onclick="setFilter(\'' + m.id + '\')">' + m.name + '</button>';
  });
  h += '<button class="login-btn' + (loggedIn ? ' on' : '') + '" onclick="toggleLogin()">' + (loggedIn ? '退出' : '登录') + '</button>';
  c.innerHTML = h;
}

function setFilter(f) { filter = f; render(); }

/* 成员卡片 */
function renderMembers() {
  var c = document.getElementById('memberBox');
  c.innerHTML = '';
  var list = filter === 'all' ? data.members : data.members.filter(function(m) { return m.id === filter; });
  list.forEach(function(m) {
    var done = 0;
    m.tasks.forEach(function(t) { if (t.isDone) done++; });
    var th = '';
    (m.tasks.slice().sort(function(a,b){return(b.pinned|0)-(a.pinned|0);})).forEach(function(t) {
      var cls = (t.isDone ? 'done' : '') + (t.pinned ? ' pinned' : '');
      var isEditTask = editModeMid === m.id;
      if (isEditTask) {
        var tt2 = '<input value="' + t.title + '" onchange="updateTaskTitle(\'' + m.id + '\',\'' + t.id + '\',this.value)" style="background:rgba(44,36,22,.03);border:1px solid rgba(44,36,22,.1);color:var(--txt);font-size:14px;font-weight:500;padding:6px 10px;border-radius:6px;width:100%;outline:none;font-family:inherit">';
        var ts2 = '<input value="' + (t.note||'') + '" onchange="updateTaskNote(\'' + m.id + '\',\'' + t.id + '\',this.value)" placeholder="备注" style="background:rgba(44,36,22,.02);border:1px solid rgba(44,36,22,.07);color:var(--sub);font-size:12px;padding:4px 8px;border-radius:5px;width:100%;outline:none;font-family:inherit;margin-top:2px">';
        th += '<div class="ti ' + cls + '">'
          + '<div class="tbody">' + tt2 + ts2 + '</div>'
          + '<div class="tacts"><button onclick="event.stopPropagation();togglePin(\'' + m.id + '\',\'' + t.id + '\')" style="background:none;border:none;cursor:pointer;padding:4px;font-size:12px;color:var(--green);opacity:.6">' + (t.pinned ? '取消置顶' : '置顶') + '</button><button onclick="event.stopPropagation();deleteTask(\'' + m.id + '\',\'' + t.id + '\')" style="background:none;border:none;cursor:pointer;padding:4px;font-size:12px;color:#ff6b6b">删除</button></div>'
          + '</div>';
      } else {
        var tt = (t.pinned ? '<span style="display:inline-block;border:1px solid rgba(122,158,90,.4);color:var(--green);font-size:10px;font-weight:500;padding:1px 6px;border-radius:4px;margin-right:6px;vertical-align:middle;letter-spacing:.02em">置顶</span>' : '') + t.title;
        var ts = t.note || '';
        th += '<div class="ti ' + cls + '">'
          + '<div class="tbody"><div class="ttit">' + tt + '</div><div class="ttime">' + ts + '</div></div>'
          + '</div>';
      }
    });
    var card = document.createElement('div');
    card.className = 'mc';
    card.setAttribute('data-mid', m.id);
    var isEdit = editModeMid === m.id;
    var dragH = loggedIn ? '<div class="drag-handle" ontouchstart="dragStart(event,\'' + m.id + '\')" onmousedown="dragStart(event,\'' + m.id + '\')">⠿</div>' : '';
    card.innerHTML = '<div class="mhd">' + dragH + '<div class="minfo"><div>' + (isEdit ? '<input value="' + m.name + '" onchange="updateMemberName(\'' + m.id + '\',this.value)" style="background:rgba(44,36,22,.03);border:1px solid rgba(44,36,22,.1);color:var(--txt);font-size:18px;font-weight:600;padding:4px 8px;border-radius:6px;width:100%;outline:none;font-family:"Josefin Sans",sans-serif">' : '<div class="mname">' + m.name + '</div>') + '<div class="mst">' + m.status + '</div></div></div>'
      + '<div style="display:flex;align-items:center;gap:8px">'
      + '<button onclick="toggleEditMode(\'' + m.id + '\')" style="background:' + (isEdit ? 'rgba(122,158,90,.12)' : 'rgba(44,36,22,.04)') + ';border:1px solid ' + (isEdit ? 'rgba(122,158,90,.25)' : 'rgba(44,36,22,.1)') + ';border-radius:50%;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:all .25s">' + (isEdit ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#5cdb95" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(44,36,22,.45)" stroke-width="1.8"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>') + '</button></div></div>'
      + '<div class="tl">' + th + '</div>'
      + '<button class="abtn" onclick="openTaskModal(\'' + m.id + '\')">＋ 添加</button>';
    c.appendChild(card);
  });
}

/* 内联编辑任务 */
function updateTaskTitle(mid, tid, val) {
  var m = data.members.find(function(x) { return x.id === mid; });
  var t = m.tasks.find(function(x) { return x.id === tid; });
  if (t && val.trim()) { t.title = val.trim(); save(); }
}
function updateTaskNote(mid, tid, val) {
  var m = data.members.find(function(x) { return x.id === mid; });
  var t = m.tasks.find(function(x) { return x.id === tid; });
  if (t) { t.note = val.trim(); save(); }
}

function togglePin(mid, tid) {
  var m = data.members.find(function(x) { return x.id === mid; });
  var t = m.tasks.find(function(x) { return x.id === tid; });
  if (t) { t.pinned = !t.pinned; save(); render(); }
}

/* 任务打卡 */
function toggleTask(mid, tid) {
  var m = data.members.find(function(x) { return x.id === mid; });
  var t = m.tasks.find(function(x) { return x.id === tid; });
  /* 已完成的任务，只有编辑模式下才能取消 */
  if (t.isDone && editModeMid !== mid) {
    toast('点击「编辑」后才能取消');
    return;
  }
  t.isDone = !t.isDone;
  t.time = t.isDone ? nowT() : '';
  if (!t.isDone) t.synced = false;
  save();
  render();
}

/* 任务弹窗 */
function openTaskModal(mid, tid) {
  document.getElementById('tmMid').value = mid;
  document.getElementById('tmTid').value = tid || '';
  if (tid) {
    document.getElementById('taskTit').innerText = '编辑内容';
    var m = data.members.find(function(x) { return x.id === mid; });
    var t = m.tasks.find(function(x) { return x.id === tid; });
    document.getElementById('tmName').value = t.title;
    document.getElementById('tmNote').value = t.note || '';
  } else {
    document.getElementById('taskTit').innerText = '添加内容';
    document.getElementById('tmName').value = '';
    document.getElementById('tmNote').value = '';
  }
  document.getElementById('taskOv').classList.add('show');
}

function closeTaskModal() { document.getElementById('taskOv').classList.remove('show'); }

function saveTask() {
  var mid = document.getElementById('tmMid').value;
  var tid = document.getElementById('tmTid').value;
  var name = document.getElementById('tmName').value.trim();
  var note = document.getElementById('tmNote').value.trim();
  if (!name) { alert('请输入任务名称'); return; }
  var m = data.members.find(function(x) { return x.id === mid; });
  if (tid) {
    var t = m.tasks.find(function(x) { return x.id === tid; });
    t.title = name;
    t.note = note;
  } else {
    m.tasks.push({id:genTid(), title:name, note:note, isDone:false, time:'', synced:false});
  }
  save();
  render();
  closeTaskModal();
  toast(tid ? '任务已更新' : '任务已添加');
}

/* 同步 */
function doSync() {
  var cnt = 0;
  data.members.forEach(function(m) {
    if (filter === 'all' || filter === m.id) {
      m.tasks.forEach(function(t) {
        if (t.isDone && !t.synced) { t.synced = true; cnt++; }
      });
    }
  });
  if (cnt > 0) { save(); render(); toast('已同步 ' + cnt + ' 项'); }
  else alert('没有需要同步的事项。');
}

/* 成员管理页 */
function openMemberPage() { document.getElementById('memberPage').classList.add('show'); renderMemList(); }
function closeMemberPage() { document.getElementById('memberPage').classList.remove('show'); selMid = null; document.getElementById('editCard').style.display = 'none'; }

function renderMemList() {
  var c = document.getElementById('mlBox');
  c.innerHTML = '';
  data.members.forEach(function(m) {
    var d = document.createElement('div');
    d.className = 'mli' + (selMid === m.id ? ' sel' : '');
    d.innerHTML = '<div><strong style="font-size:15px">' + m.name + '</strong>'
      + '<div style="font-size:12px;color:var(--sub);margin-top:2px">' + m.status + ' · ' + m.tasks.length + '个任务</div></div>'
      + '<span style="font-size:12px;color:var(--green);font-weight:700">点击编辑 ⟩</span>';
    d.onclick = function() { selectMem(m.id); };
    c.appendChild(d);
  });
}

function selectMem(id) {
  selMid = id;
  var m = data.members.find(function(x) { return x.id === id; });
  document.getElementById('emId').value = m.id;
  document.getElementById('emName').value = m.name;
  document.getElementById('emStatus').value = m.status;
  document.getElementById('editCard').style.display = 'block';
  renderMemList();
}

function saveMemEdit() {
  var id = document.getElementById('emId').value;
  var name = document.getElementById('emName').value.trim();
  var status = document.getElementById('emStatus').value.trim();
  if (!name) { alert('姓名不能为空'); return; }
  var m = data.members.find(function(x) { return x.id === id; });
  m.name = name;
  m.status = status;
  save();
  render();
  renderMemList();
  toast('已更新【' + name + '】');
}

/* 日历历史记录 */
function getTodayKey() {
  var d = new Date();
  return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
}

function saveTodayHistory() {
  var k = getTodayKey();
  var hist = JSON.parse(localStorage.getItem('fc_history') || '{}');
  var done = 0, total = 0;
  data.members.forEach(function(m) {
    m.tasks.forEach(function(t) {
      total++;
      if (t.isDone) done++;
    });
  });
  hist[k] = { done: done, total: total };
  localStorage.setItem('fc_history', JSON.stringify(hist));
}

var calYear, calMonth;

function openCalendarPage() {
  var d = new Date();
  calYear = d.getFullYear();
  calMonth = d.getMonth();
  document.getElementById('calendarPage').classList.add('show');
  renderCalendar();
}

function closeCalendarPage() {
  document.getElementById('calendarPage').classList.remove('show');
}

function calPrevMonth() {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function calNextMonth() {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('calMonLabel').innerText = calYear + '年 ' + (calMonth + 1) + '月';
  var hist = JSON.parse(localStorage.getItem('fc_history') || '{}');
  var today = getTodayKey();
  var g = document.getElementById('calGrid');
  g.innerHTML = '';

  var headers = ['日','一','二','三','四','五','六'];
  headers.forEach(function(h) {
    g.innerHTML += '<div class="caldayh">' + h + '</div>';
  });

  var firstDay = new Date(calYear, calMonth, 1).getDay();
  var daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  for (var i = 0; i < firstDay; i++) {
    g.innerHTML += '<div class="calday empty"></div>';
  }

  for (var d = 1; d <= daysInMonth; d++) {
    var dk = calYear + '-' + ('0'+(calMonth+1)).slice(-2) + '-' + ('0'+d).slice(-2);
    var cls = 'calday';
    if (dk === today) cls += ' today';
    var dotHtml = '';
    if (hist[dk]) {
      var r = hist[dk];
      if (r.total === 0) {
        dotHtml = '';
      } else if (r.done === r.total) {
        dotHtml = '<div class="caldot green"></div>';
      } else if (r.done > 0) {
        dotHtml = '<div class="caldot orange"></div>';
      } else {
        dotHtml = '<div class="caldot gray"></div>';
      }
    }
    g.innerHTML += '<div class="' + cls + '">' + d + dotHtml + '</div>';
  }
}

var loggedIn = false;

function toggleLogin() {
  loggedIn = !loggedIn;
  localStorage.setItem('fc_login', loggedIn ? '1' : '0');
  toast(loggedIn ? '已登录，可拖动卡片排序' : '已退出登录');
  render();
}

/* 拖拽排序 */
var dragMid = null;
var dragEl = null;
var dragStartY = 0;
var dragPlaceholder = null;
var dragInitialIdx = -1;

function dragStart(e, mid) {
  if (!loggedIn) return;
  e.preventDefault();
  dragMid = mid;
  dragEl = document.querySelector('.mc[data-mid="' + mid + '"]');
  if (!dragEl) return;
  var t = e.touches ? e.touches[0] : e;
  dragStartY = t.clientY;
  dragInitialIdx = data.members.findIndex(function(x) { return x.id === mid; });
  dragEl.classList.add('dragging');
  dragPlaceholder = dragEl.cloneNode(true);
  dragPlaceholder.removeAttribute('data-mid');
  dragPlaceholder.classList.remove('dragging');
  dragPlaceholder.classList.add('drag-placeholder');
  dragPlaceholder.querySelectorAll('.drag-handle,.tacts,button').forEach(function(el) { el.style.display = 'none'; });
  dragPlaceholder.style.pointerEvents = 'none';
  dragEl.parentNode.insertBefore(dragPlaceholder, dragEl.nextSibling);
  dragEl.style.position = 'relative';
  dragEl.style.zIndex = '100';
}

function dragMove(e) {
  if (!dragEl) return;
  e.preventDefault();
  var t = e.touches ? e.touches[0] : e;
  var dy = t.clientY - dragStartY;
  dragEl.style.transform = 'translateY(' + dy + 'px)';

  var cards = document.querySelectorAll('.mc:not(.dragging):not(.drag-placeholder)');
  var targetIdx = -1;
  cards.forEach(function(card, i) {
    var rect = card.getBoundingClientRect();
    var midY = rect.top + rect.height / 2;
    if (t.clientY > midY) targetIdx = i + 1;
    else if (targetIdx === -1) targetIdx = i;
  });
  if (targetIdx === -1) targetIdx = 0;

  var placeholders = document.querySelectorAll('.drag-placeholder');
  placeholders.forEach(function(p) {
    if (p !== dragPlaceholder) p.remove();
  });

  var ms = document.getElementById('memberBox');
  var allCards = ms.querySelectorAll('.mc');
  if (targetIdx >= allCards.length) {
    ms.appendChild(dragPlaceholder);
  } else {
    ms.insertBefore(dragPlaceholder, allCards[targetIdx]);
  }
}

function dragEnd(e) {
  if (!dragEl) return;
  dragEl.classList.remove('dragging');
  dragEl.style.transform = '';
  dragEl.style.position = '';
  dragEl.style.zIndex = '';

  /* 将拖拽元素插入到占位符位置 */
  var ph = document.querySelector('.drag-placeholder');
  if (ph) {
    ph.parentNode.insertBefore(dragEl, ph);
    ph.remove();
  }

  /* 读取最终 DOM 顺序 */
  var boxes = document.querySelectorAll('#memberBox .mc[data-mid]');
  var newOrder = [];
  boxes.forEach(function(b) { newOrder.push(b.getAttribute('data-mid')); });

  var newMembers = [];
  newOrder.forEach(function(id) {
    var m = data.members.find(function(x) { return x.id === id; });
    if (m) newMembers.push(m);
  });
  data.members = newMembers;
  save();
  render();
  toast('排序已更新');

  dragMid = null;
  dragEl = null;
  dragPlaceholder = null;
  dragInitialIdx = -1;
}

document.addEventListener('touchmove', function(e) { if (dragEl) dragMove(e); }, {passive: false});
document.addEventListener('mousemove', function(e) { if (dragEl) dragMove(e); });
document.addEventListener('touchend', function(e) { if (dragEl) dragEnd(e); });
document.addEventListener('mouseup', function(e) { if (dragEl) dragEnd(e); });

function updateMemberName(mid, name) {
  var m = data.members.find(function(x) { return x.id === mid; });
  if (m && name.trim()) { m.name = name.trim(); save(); }
}

function toggleEditMode(mid) {
  editModeMid = (editModeMid === mid) ? null : mid;
  render();
}

/* 家庭图表页 */
function openFamilyPage() { document.getElementById('familyPage').classList.add('show'); renderChart(); }
function closeFamilyPage() { document.getElementById('familyPage').classList.remove('show'); }

function renderChart() {
  var c = document.getElementById('barsBox');
  c.innerHTML = '';
  var gAll = 0, gDone = 0;
  data.members.forEach(function(m) {
    var done = 0;
    m.tasks.forEach(function(t) { if (t.isDone) done++; });
    var total = m.tasks.length;
    gAll += total;
    gDone += done;
    var pct = total === 0 ? 0 : Math.round(done / total * 100);
    var row = document.createElement('div');
    row.className = 'br';
    row.innerHTML = '<div class="blb">' + m.name + '</div>'
      + '<div class="btk"><div class="bf" style="width:' + pct + '%"><span class="bft">' + done + '/' + total + '</span></div>'
      + '<span class="bpct">' + pct + '%</span></div>';
    c.appendChild(row);
  });
  document.getElementById('smT').innerText = gAll;
  document.getElementById('smD').innerText = gDone;
  document.getElementById('smP').innerText = (gAll === 0 ? '0%' : Math.round(gDone / gAll * 100) + '%');
  drawDonut(gDone, gAll - gDone);
}

function drawDonut(done, undone) {
  var cv = document.getElementById('donutC');
  var ctx = cv.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var w = 280, h = 210;
  cv.width = w * dpr;
  cv.height = h * dpr;
  cv.style.width = w + 'px';
  cv.style.height = h + 'px';
  ctx.scale(dpr, dpr);
  var cx = w / 2, cy = h / 2, r = 70, lw = 18;
  ctx.clearRect(0, 0, w, h);
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.lineWidth = lw;
  ctx.strokeStyle = 'rgba(44,36,22,.08)';
  ctx.stroke();
  var total = done + undone;
  if (total > 0) {
    var endA = Math.PI * 2 * done / total - Math.PI / 2;
    ctx.beginPath();
    ctx.arc(cx, cy, r, -Math.PI / 2, endA);
    ctx.lineWidth = lw;
    ctx.strokeStyle = '#7a9e5a';
    ctx.lineCap = 'round';
    ctx.stroke();
  }
  ctx.fillStyle = '#2c2416';
  ctx.font = '600 28px -apple-system';
  ctx.textAlign = 'center';
  ctx.fillText(done + '/' + total, cx, cy + 2);
  ctx.fillStyle = '#8a7d68';
  ctx.font = '13px -apple-system';
  ctx.textAlign = 'center';
  ctx.fillText('完成数', cx, cy + 22);
}

/* 删除任务 */
function deleteTask(mid, tid) {
  if (!confirm('确定删除该任务？')) return;
  var m = data.members.find(function(x) { return x.id === mid; });
  m.tasks = m.tasks.filter(function(t) { return t.id !== tid; });
  save(); render();
  toast('任务已删除');
}

/* 提醒 */
function openRemModal(mid, tid) {
  if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
  document.getElementById('rmMid').value = mid;
  document.getElementById('rmTid').value = tid;
  document.getElementById('rmTime').value = '';
  document.getElementById('remOv').classList.add('show');
}
function closeRemModal() { document.getElementById('remOv').classList.remove('show'); }
function saveReminder() {
  var mid = document.getElementById('rmMid').value;
  var tid = document.getElementById('rmTid').value;
  var v = document.getElementById('rmTime').value;
  if (!v) { alert('请选择提醒时间'); return; }
  var now = new Date();
  var p = v.split(':');
  var d = new Date(now.getFullYear(), now.getMonth(), now.getDate(), parseInt(p[0],10), parseInt(p[1],10), 0, 0);
  if (d <= now) d.setDate(d.getDate() + 1);
  var list = JSON.parse(localStorage.getItem('fc_rem') || '[]');
  list.push({mid:mid, tid:tid, time:d.getTime()});
  localStorage.setItem('fc_rem', JSON.stringify(list));
  closeRemModal();
  toast('提醒已设置');
  if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
}
function checkReminders() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  var now = Date.now();
  var list = JSON.parse(localStorage.getItem('fc_rem') || '[]');
  var keep = [];
  list.forEach(function(r) {
    if (r.time <= now) {
      var mm = data.members.find(function(x) { return x.id === r.mid; });
      if (mm) {
        var tt = mm.tasks.find(function(x) { return x.id === r.tid; });
        if (tt) new Notification('照护提醒', { body: mm.name + ' 的任务：' + tt.title });
      }
    } else keep.push(r);
  });
  if (keep.length !== list.length) localStorage.setItem('fc_rem', JSON.stringify(keep));
}
setInterval(checkReminders, 30000);

init();
</script>
