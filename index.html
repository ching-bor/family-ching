<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>My Family — 家庭照护记录</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#20A162">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Family">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-192.png">
<link rel="apple-touch-icon" sizes="167x167" href="icon-192.png">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<style>
:root{--bg:#F7F8FA;--card:#fff;--green:#20A162;--grnlt:#E7F5EE;--orange:#FF8A00;--orlt:#FFF0E0;--txt:#111;--sub:#888;--box:#F2F2F6;--rld:24px;--rmd:16px;--rsm:12px;--sd:0 4px 16px rgba(0,0,0,.04);--sdn:0 8px 32px rgba(0,0,0,.1)}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Helvetica,Arial,sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:110px;overflow-x:hidden}
.wrap{max-width:480px;margin:0 auto;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;margin:20px 0 24px}
.header h1{font-size:34px;font-weight:800;letter-spacing:1px}
.bref{width:44px;height:44px;background:var(--card);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:var(--sd);border:none;cursor:pointer;color:var(--green);transition:transform .2s}
.bref:active{transform:scale(.9)}
.scard{background:var(--card);border-radius:var(--rld);padding:24px;box-shadow:var(--sd);margin-bottom:24px}
.shd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.shd h2{font-size:24px;font-weight:800;margin-bottom:4px}
.sdate{color:var(--sub);font-size:15px;font-weight:500}
.pc{height:4px;background:#E5E5EA;border-radius:2px;margin:20px 0;overflow:hidden}
.pf{height:100%;background:var(--green);border-radius:2px;transition:width .4s}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stat{background:var(--box);border-radius:var(--rmd);padding:16px 12px;display:flex;flex-direction:column;transition:all .2s}
.stat.cp{cursor:pointer}.stat.cp:hover{background:#E8E8ED}.stat.cp:active{transform:scale(.97)}
.sv{font-size:22px;font-weight:800;margin-bottom:4px;line-height:1}
.sl{font-size:12px;color:var(--sub);font-weight:500}
.flts{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px;margin-bottom:14px;scrollbar-width:none}
.flts::-webkit-scrollbar{display:none}
.pill{padding:10px 20px;background:var(--card);border-radius:24px;font-size:15px;font-weight:700;color:var(--txt);border:none;cursor:pointer;white-space:nowrap;box-shadow:var(--sd);transition:all .2s}
.pill.act{background:var(--green);color:#fff}
.ms{display:flex;flex-direction:column;gap:20px}
.mc{background:var(--card);border-radius:var(--rld);padding:24px;box-shadow:var(--sd)}
.mhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.minfo{display:flex;align-items:center;gap:12px}
.mava{width:48px;height:48px;background:var(--orlt);color:var(--orange);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.mname{font-size:20px;font-weight:800}.mst{font-size:14px;color:var(--sub);margin-top:2px}
.bg{background:var(--orlt);color:var(--orange);padding:4px 10px;border-radius:20px;font-size:14px;font-weight:700}
.tl{display:flex;flex-direction:column;gap:10px}
.ti{display:flex;align-items:center;padding:12px;background:var(--box);border-radius:var(--rmd);cursor:pointer;transition:all .2s}
.ti.done{background:var(--card);border:1px solid var(--grnlt)}
.tico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-right:12px;background:#E5E5EA;transition:all .3s}
.ti.done .tico{background:var(--grnlt)}
.chk{width:20px;height:20px;border-radius:50%;background:#C7C7CC;display:flex;align-items:center;justify-content:center;color:#fff}
.ti.done .chk{background:var(--green)}
.tbody{flex:1}.ttit{font-size:16px;font-weight:700;margin-bottom:2px}.ttime{font-size:13px;color:var(--sub)}
.tacts{display:flex;gap:4px;padding-right:4px}.tacts button{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;display:flex;align-items:center}
.abtn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;background:var(--grnlt);border:none;border-radius:var(--rsm);font-size:14px;font-weight:700;color:var(--green);cursor:pointer;margin-top:12px;width:100%;transition:all .2s}
.abtn:active{transform:scale(.98)}
.login-btn{padding:8px 16px;background:var(--card);border:2px solid var(--green);border-radius:24px;font-size:14px;font-weight:700;color:var(--green);cursor:pointer;white-space:nowrap;transition:all .2s;box-shadow:var(--sd)}
.login-btn.on{background:var(--green);color:#fff}
.drag-handle{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;cursor:grab;color:var(--sub);font-size:18px;user-select:none;touch-action:none;flex-shrink:0}
.drag-handle:active{cursor:grabbing;background:var(--box)}
.mc.dragging{opacity:.6;transform:scale(.97);box-shadow:0 8px 32px rgba(0,0,0,.15)}
.mc.drag-placeholder{border:2px dashed var(--green);background:var(--grnlt);opacity:.5}
.ovr{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:600;display:none;align-items:flex-end;justify-content:center}
.ovr.show{display:flex}
.sht{background:#fff;border-radius:24px 24px 0 0;padding:28px 20px 40px;width:100%;max-width:480px;animation:su .3s ease;position:relative}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.shtt{font-size:20px;font-weight:800;margin-bottom:20px;text-align:center}
.shx{position:absolute;top:20px;right:20px;background:none;border:none;font-size:24px;color:var(--sub);cursor:pointer}
.fg{margin-bottom:18px}.fg label{display:block;font-size:14px;font-weight:700;margin-bottom:8px}
.fg input{width:100%;background:var(--box);border:none;padding:14px 16px;border-radius:var(--rmd);font-size:15px;font-weight:600;outline:none;color:var(--txt)}
.er{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.er span{font-size:22px;padding:6px 8px;background:var(--box);border-radius:8px;cursor:pointer;transition:all .15s}
.er span:hover{background:var(--grnlt);transform:scale(1.15)}
.btng{width:100%;background:var(--green);color:#fff;border:none;padding:16px;border-radius:var(--rmd);font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(32,161,98,.2)}
.btng:active{transform:scale(.98)}
.toast{position:fixed;top:-60px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:12px 24px;border-radius:30px;font-size:14px;font-weight:700;box-shadow:0 8px 24px rgba(32,161,98,.3);z-index:1000;transition:top .4s;white-space:nowrap}
.toast.show{top:30px}
.ibnr{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--card);border-radius:var(--rmd);padding:16px 20px;box-shadow:0 8px 32px rgba(0,0,0,.15);z-index:200;display:none;align-items:center;gap:12px;max-width:90%;border:1px solid var(--grnlt)}
.ibnr.show{display:flex}.ibnrt{flex:1;font-size:14px;font-weight:600}
.ibnrb{background:var(--green);color:#fff;border:none;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer}
.ibnrx{background:none;border:none;font-size:18px;color:var(--sub);cursor:pointer}
.sp{position:fixed;top:0;left:100%;width:100%;height:100%;background:var(--bg);z-index:500;transition:left .4s cubic-bezier(.25,1,.5,1);overflow-y:auto}
.sp.show{left:0}.spc{max-width:480px;margin:0 auto;padding:30px 20px 60px}
.sphd{display:flex;align-items:center;margin-bottom:24px}
.bkb{background:none;border:none;font-size:16px;color:var(--green);font-weight:700;cursor:pointer}
.mli{background:var(--card);border-radius:var(--rmd);padding:16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;box-shadow:var(--sd);cursor:pointer;border:2px solid transparent;transition:all .2s}
.mli.sel{border-color:var(--green);background:var(--grnlt)}
.cs{background:var(--card);border-radius:var(--rld);padding:24px;box-shadow:var(--sd);margin-bottom:20px}
.ct{font-size:18px;font-weight:800;margin-bottom:18px}
.br{display:flex;align-items:center;margin-bottom:16px}
.blb{width:70px;font-size:14px;font-weight:700;text-align:right;padding-right:12px;flex-shrink:0}
.btk{flex:1;height:28px;background:var(--box);border-radius:14px;overflow:hidden;position:relative}
.bf{height:100%;border-radius:14px;background:var(--green);transition:width .6s;display:flex;align-items:center;justify-content:flex-end;padding-right:10px}
.bft{font-size:12px;font-weight:700;color:#fff}
.bpct{position:absolute;right:10px;top:0;height:100%;display:flex;align-items:center;font-size:12px;font-weight:700;color:var(--sub)}
.csm{display:flex;gap:12px;margin-top:18px}
.csmi{flex:1;background:var(--box);border-radius:var(--rmd);padding:14px;text-align:center}
.csmv{font-size:24px;font-weight:800;color:var(--green)}.csml{font-size:12px;color:var(--sub);font-weight:600;margin-top:4px}
.nw{position:fixed;bottom:30px;left:0;width:100%;display:flex;justify-content:center;z-index:100;pointer-events:none}
.nav{background:rgba(255,255,255,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:12px 40px;border-radius:40px;display:flex;gap:50px;box-shadow:var(--sdn);pointer-events:auto;border:1px solid rgba(255,255,255,.4)}
.ni{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--txt);cursor:pointer}.ni.act{color:var(--green)}
.ni svg{width:24px;height:24px}.ni span{font-size:11px;font-weight:700}
</style>
</head>
<body>

<div id="toast" class="toast"></div>
<div class="ibnr" id="ibnr"><div class="ibnrt">安装到主屏幕，像 App 一样使用</div><button class="ibnrb" id="ibnrBtn">安装</button><button class="ibnrx" id="ibnrX">&times;</button></div>

<div class="wrap">
<div class="header"><h1>今日</h1></div>

<div class="scard">
<div class="shd"><div><h2>My Family</h2><div class="sdate" id="curDate"></div></div></div>
<div class="pc"><div class="pf" id="progBar" style="width:0%"></div></div>
<div class="stats">
<div class="stat cp" onclick="openMemberPage()"><div style="margin-bottom:12px;color:var(--green)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><div class="sv" id="stM">0</div><div class="sl">成员管理 ⟩</div></div>
<div class="stat"><div style="margin-bottom:12px;color:var(--green)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><div class="sv" id="stD">0</div><div class="sl">今日完成</div></div>
<div class="stat cp" onclick="doSync()"><div style="margin-bottom:12px;color:var(--orange)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg></div><div class="sv" id="stS">0</div><div class="sl">待同步 ⟳</div></div>
</div>
</div>

<div class="flts" id="filterBox"></div>
<div class="ms" id="memberBox"></div>
</div>

<!-- 任务弹窗 -->
<div class="ovr" id="taskOv">
<div class="sht">
<button class="shx" onclick="closeTaskModal()">&times;</button>
<div class="shtt" id="taskTit">添加任务</div>
<input type="hidden" id="tmMid"><input type="hidden" id="tmTid">
<div class="fg"><label>任务名称</label><input type="text" id="tmName" placeholder="例如：吃早药"></div>
<div class="fg"><label>Emoji 图标</label>
<div class="er" id="erow">
<span>💊</span><span>🌡️</span><span>🩹</span><span>🚶</span>
<span>💧</span><span>❤️</span><span>🦶</span><span>🍜</span>
<span>😴</span><span>📝</span><span>🏠</span><span>🥗</span>
</div>
<input type="hidden" id="tmEmoji" value="💊">
</div>
<button class="btng" onclick="saveTask()">保存</button>
</div>
</div>

<!-- 提醒弹窗 -->
<div class="ovr" id="remOv">
<div class="sht">
<button class="shx" onclick="closeRemModal()">&times;</button>
<div class="shtt">⏰ 设置提醒</div>
<input type="hidden" id="rmMid">
<input type="hidden" id="rmTid">
<div class="fg"><label>提醒时间</label><input type="time" id="rmTime"></div>
<button class="btng" onclick="saveReminder()">设置提醒</button>
</div>
</div>

<!-- 成员管理页 -->
<div class="sp" id="memberPage">
<div class="spc">
<div class="sphd"><button class="bkb" onclick="closeMemberPage()">⟨ 返回</button><div style="flex:1;text-align:center;font-size:20px;font-weight:800;margin-right:40px">成员管理</div></div>
<div id="mlBox"></div>
<div style="margin-top:20px">
<h3 style="font-size:14px;font-weight:800;margin-bottom:12px;color:var(--sub)">✏️ 编辑成员</h3>
<div id="editCard" style="background:var(--card);border-radius:var(--rld);padding:24px;box-shadow:var(--sd);display:none">
<input type="hidden" id="emId">
<div class="fg"><label>姓名</label><input type="text" id="emName"></div>
<div class="fg"><label>关于</label><input type="text" id="emStatus"></div>
<button class="btng" onclick="saveMemEdit()">确认保存</button>
</div>
</div>
</div>
</div>

<!-- 家庭图表页 -->
<div class="sp" id="familyPage">
<div class="spc">
<div class="sphd"><button class="bkb" onclick="closeFamilyPage()">⟨ 返回</button><div style="flex:1;text-align:center;font-size:20px;font-weight:800;margin-right:40px">家庭总览</div></div>
<div class="cs">
<div class="ct">📊 任务完成统计</div>
<div id="barsBox"></div>
<div class="csm">
<div class="csmi"><div class="csmv" id="smT">0</div><div class="csml">总任务数</div></div>
<div class="csmi"><div class="csmv" id="smD">0</div><div class="csml">已完成</div></div>
<div class="csmi"><div class="csmv" id="smP">0%</div><div class="csml">完成率</div></div>
</div>
</div>
<div class="cs">
<div class="ct">🎯 完成率</div>
<canvas id="donutC" style="display:block;margin:0 auto;max-width:100%;width:280px;height:210px"></canvas>
</div>
</div>
</div>

<!-- 底部导航 -->
<div class="nw">
<div class="nav">
<div class="ni act" onclick="window.scrollTo({top:0,behavior:'smooth'})">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
<span>今日</span>
</div>
<div class="ni" onclick="openFamilyPage()">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
<span>家庭</span>
</div>
</div>
</div>

<script>
/* PWA */
var _dp = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  _dp = e;
  document.getElementById('ibnr').classList.add('show');
});
document.getElementById('ibnrBtn').addEventListener('click', function() {
  if (_dp) {
    _dp.prompt();
    _dp.userChoice.then(function(r) {
      if (r.outcome === 'accepted') document.getElementById('ibnr').classList.remove('show');
      _dp = null;
    });
  }
});
document.getElementById('ibnrX').addEventListener('click', function() {
  document.getElementById('ibnr').classList.remove('show');
});
window.addEventListener('appinstalled', function() {
  document.getElementById('ibnr').classList.remove('show');
});
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('service-worker.js');
  });
}

/* 数据 */
var DEF = {
  members: [
    {id:'m1', name:'秦闻达', status:'', tasks:[
      {id:'t1', title:'高血压药', emoji:'💊', pinned:true, isDone:false, time:'', synced:false},
      {id:'t2', title:'3公里散步', emoji:'🚶', pinned:true, isDone:false, time:'', synced:false, trackSteps:true}
    ]},
    {id:'m2', name:'孙传兰', status:'', tasks:[]},
    {id:'m3', name:'秦佳晗', status:'', tasks:[]}
  ]
};

var data = {};
var filter = 'all';
var selMid = null;
var editModeMid = null;
var tidCnt = 100;

function genTid() { tidCnt++; return 't' + tidCnt; }

/* 步数追踪 */
function getStepKey() {
  var d = new Date();
  return 'fc_steps_' + d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
}
function getTodaySteps() { return parseInt(localStorage.getItem(getStepKey()) || '0'); }
function updateTodaySteps(mid, tid) {
  var cur = getTodaySteps();
  var v = prompt('输入今天步数（目前：' + cur + '步）', cur || '');
  if (v === null) return;
  var n = parseInt(v, 10);
  if (isNaN(n) || n < 0) { alert('请输入有效数字'); return; }
  localStorage.setItem(getStepKey(), String(n));
  render();
  toast('步数已更新');
}

function todayStr() {
  var d = new Date();
  var w = ['周日','周一','周二','周三','周四','周五','周六'];
  var m = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  return w[d.getDay()] + ', ' + m[d.getMonth()] + ' ' + d.getDate();
}

function nowT() {
  var d = new Date();
  return ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
}

function save() {
  localStorage.setItem('fc_v4', JSON.stringify(data));
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

/* 初始化 */
function init() {
  loggedIn = localStorage.getItem('fc_login') === '1';
  var s = localStorage.getItem('fc_v4');
  if (s) {
    data = JSON.parse(s);
  } else {
    data = JSON.parse(JSON.stringify(DEF));
  }
  document.getElementById('curDate').innerText = todayStr();
  render();
}

function resetData() {
  if (!confirm('确定重置今日所有记录？')) return;
  data.members.forEach(function(m) {
    m.tasks.forEach(function(t) {
      t.isDone = false;
      t.time = '';
      t.synced = false;
    });
  });
  save();
  render();
  toast('已重置');
}

/* 渲染 */
function render() {
  document.getElementById('stM').innerText = data.members.length;
  var tAll = 0, tDone = 0, tSync = 0;
  data.members.forEach(function(m) {
    if (filter === 'all' || filter === m.id) {
      m.tasks.forEach(function(t) {
        tAll++;
        if (t.isDone) tDone++;
        if (t.isDone && !t.synced) tSync++;
      });
    }
  });
  document.getElementById('stD').innerText = tDone;
  document.getElementById('stS').innerText = tSync;
  document.getElementById('progBar').style.width = (tAll === 0 ? '0%' : (tDone / tAll * 100) + '%');
  renderFilters();
  renderMembers();
}

function renderFilters() {
  var c = document.getElementById('filterBox');
  var h = '<button class="pill ' + (filter === 'all' ? 'act' : '') + '" onclick="setFilter(\'all\')">全部</button>';
  data.members.forEach(function(m) {
    h += '<button class="pill ' + (filter === m.id ? 'act' : '') + '" onclick="setFilter(\'' + m.id + '\')">' + m.name + '</button>';
  });
  h += '<button class="login-btn' + (loggedIn ? ' on' : '') + '" onclick="toggleLogin()">' + (loggedIn ? '退出' : '登录') + '</button>';
  c.innerHTML = h;
}

function setFilter(f) { filter = f; render(); }

/* 成员卡片 */
function renderMembers() {
  var c = document.getElementById('memberBox');
  c.innerHTML = '';
  var list = filter === 'all' ? data.members : data.members.filter(function(m) { return m.id === filter; });
  list.forEach(function(m) {
    var done = 0;
    m.tasks.forEach(function(t) { if (t.isDone) done++; });
    var th = '';
    (m.tasks.slice().sort(function(a,b){return(b.pinned|0)-(a.pinned|0);})).forEach(function(t) {
      var cls = t.isDone ? 'done' : '';
      var ts = t.isDone ? '已记录 ' + t.time : (t.trackSteps ? '已走' + getTodaySteps() + '步 · 点击更新' : '待完成');
      var tt = (t.pinned && !t.isDone ? '<span style="color:var(--orange);font-size:11px;font-weight:700">[置顶]</span> ' : '') + (t.emoji || '') + ' ' + t.title;
      th += '<div class="ti ' + cls + '" onclick="toggleTask(\'' + m.id + '\',\'' + t.id + '\')">'
        + '<div class="tico"><div class="chk">'
        + (t.isDone ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="4"><polyline points="20 6 9 17 4 12"/></svg>' : '')
        + '</div></div>'
        + '<div class="tbody"><div class="ttit">' + tt + '</div><div class="ttime"' + (t.trackSteps && !t.isDone ? ' onclick="event.stopPropagation();updateTodaySteps(\'' + m.id + '\',\'' + t.id + '\')" style="cursor:pointer;color:var(--green)"' : '') + '>' + ts + '</div></div>'
        + '<div class="tacts">' + (editModeMid === m.id ? (t.pinned ? '' : '<button onclick="event.stopPropagation();deleteTask(\'' + m.id + '\',\'' + t.id + '\')" style="background:none;border:none;cursor:pointer;padding:4px;font-size:16px">🗑️</button>') + (!t.isDone ? '<button onclick="event.stopPropagation();openRemModal(\'' + m.id + '\',\'' + t.id + '\')" style="background:none;border:none;cursor:pointer;padding:4px;font-size:16px;display:flex;align-items:center">🔔</button>' : '') + (t.pinned ? '' : '<button onclick="event.stopPropagation();openTaskModal(\'' + m.id + '\',\'' + t.id + '\')">')
        + '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">'
        + '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>'
        + '<path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>' : '') + '</div>'
        + '</div>';
    });
    var card = document.createElement('div');
    card.className = 'mc';
    card.setAttribute('data-mid', m.id);
    var isEdit = editModeMid === m.id;
    var dragH = loggedIn ? '<div class="drag-handle" ontouchstart="dragStart(event,\'' + m.id + '\')" onmousedown="dragStart(event,\'' + m.id + '\')">⠿</div>' : '';
    card.innerHTML = '<div class="mhd">' + dragH + '<div class="minfo"><div><div class="mname">' + m.name + '</div><div class="mst">' + m.status + '</div></div></div>'
      + '<div style="display:flex;align-items:center;gap:8px">'
      + '<button onclick="toggleEditMode(\'' + m.id + '\')" style="background:' + (isEdit ? 'var(--grnlt)' : 'var(--box)') + ';border:none;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:11px;font-weight:700;color:' + (isEdit ? 'var(--green)' : 'var(--sub)') + ';opacity:.5">' + (isEdit ? '完成' : '编辑') + '</button></div></div>'
      + '<div class="tl">' + th + '</div>'
      + '<button class="abtn" onclick="openTaskModal(\'' + m.id + '\')">＋ 添加</button>';
    c.appendChild(card);
  });
}

/* 任务打卡 */
function toggleTask(mid, tid) {
  var m = data.members.find(function(x) { return x.id === mid; });
  var t = m.tasks.find(function(x) { return x.id === tid; });
  /* 已完成的任务，只有编辑模式下才能取消 */
  if (t.isDone && editModeMid !== mid) {
    toast('点击「编辑」后才能取消');
    return;
  }
  t.isDone = !t.isDone;
  t.time = t.isDone ? nowT() : '';
  if (!t.isDone) t.synced = false;
  save();
  render();
}

/* 任务弹窗 */
function openTaskModal(mid, tid) {
  document.getElementById('tmMid').value = mid;
  document.getElementById('tmTid').value = tid || '';
  document.querySelectorAll('.er span').forEach(function(s) { s.style.background = ''; });
  if (tid) {
    document.getElementById('taskTit').innerText = '编辑任务';
    var m = data.members.find(function(x) { return x.id === mid; });
    var t = m.tasks.find(function(x) { return x.id === tid; });
    document.getElementById('tmName').value = t.title;
    document.getElementById('tmEmoji').value = t.emoji || '💊';
  } else {
    document.getElementById('taskTit').innerText = '添加任务';
    document.getElementById('tmName').value = '';
    document.getElementById('tmEmoji').value = '💊';
  }
  document.getElementById('taskOv').classList.add('show');
}

function closeTaskModal() { document.getElementById('taskOv').classList.remove('show'); }

document.querySelectorAll('.er span').forEach(function(s) {
  s.addEventListener('click', function() {
    document.getElementById('tmEmoji').value = this.innerText;
    document.querySelectorAll('.er span').forEach(function(el) { el.style.background = ''; });
    this.style.background = 'var(--grnlt)';
  });
});

function saveTask() {
  var mid = document.getElementById('tmMid').value;
  var tid = document.getElementById('tmTid').value;
  var name = document.getElementById('tmName').value.trim();
  var emoji = document.getElementById('tmEmoji').value;
  if (!name) { alert('请输入任务名称'); return; }
  var m = data.members.find(function(x) { return x.id === mid; });
  if (tid) {
    var t = m.tasks.find(function(x) { return x.id === tid; });
    t.title = name;
    t.emoji = emoji;
  } else {
    m.tasks.push({id:genTid(), title:name, emoji:emoji, isDone:false, time:'', synced:false});
  }
  save();
  render();
  closeTaskModal();
  toast(tid ? '任务已更新' : '任务已添加');
}

/* 同步 */
function doSync() {
  var cnt = 0;
  data.members.forEach(function(m) {
    if (filter === 'all' || filter === m.id) {
      m.tasks.forEach(function(t) {
        if (t.isDone && !t.synced) { t.synced = true; cnt++; }
      });
    }
  });
  if (cnt > 0) { save(); render(); toast('已同步 ' + cnt + ' 项'); }
  else alert('没有需要同步的事项。');
}

/* 成员管理页 */
function openMemberPage() { document.getElementById('memberPage').classList.add('show'); renderMemList(); }
function closeMemberPage() { document.getElementById('memberPage').classList.remove('show'); selMid = null; document.getElementById('editCard').style.display = 'none'; }

function renderMemList() {
  var c = document.getElementById('mlBox');
  c.innerHTML = '';
  data.members.forEach(function(m) {
    var d = document.createElement('div');
    d.className = 'mli' + (selMid === m.id ? ' sel' : '');
    d.innerHTML = '<div><strong style="font-size:15px">' + m.name + '</strong>'
      + '<div style="font-size:12px;color:var(--sub);margin-top:2px">' + m.status + ' · ' + m.tasks.length + '个任务</div></div>'
      + '<span style="font-size:12px;color:var(--green);font-weight:700">点击编辑 ✏️</span>';
    d.onclick = function() { selectMem(m.id); };
    c.appendChild(d);
  });
}

function selectMem(id) {
  selMid = id;
  var m = data.members.find(function(x) { return x.id === id; });
  document.getElementById('emId').value = m.id;
  document.getElementById('emName').value = m.name;
  document.getElementById('emStatus').value = m.status;
  document.getElementById('editCard').style.display = 'block';
  renderMemList();
}

function saveMemEdit() {
  var id = document.getElementById('emId').value;
  var name = document.getElementById('emName').value.trim();
  var status = document.getElementById('emStatus').value.trim();
  if (!name) { alert('姓名不能为空'); return; }
  var m = data.members.find(function(x) { return x.id === id; });
  m.name = name;
  m.status = status;
  save();
  render();
  renderMemList();
  toast('已更新【' + name + '】');
}

var loggedIn = false;

function toggleLogin() {
  loggedIn = !loggedIn;
  localStorage.setItem('fc_login', loggedIn ? '1' : '0');
  toast(loggedIn ? '已登录，可拖动卡片排序' : '已退出登录');
  render();
}

/* 拖拽排序 */
var dragMid = null;
var dragEl = null;
var dragStartY = 0;
var dragPlaceholder = null;
var dragInitialIdx = -1;

function dragStart(e, mid) {
  if (!loggedIn) return;
  e.preventDefault();
  dragMid = mid;
  dragEl = document.querySelector('.mc[data-mid="' + mid + '"]');
  if (!dragEl) return;
  var t = e.touches ? e.touches[0] : e;
  dragStartY = t.clientY;
  dragInitialIdx = data.members.findIndex(function(x) { return x.id === mid; });
  dragEl.classList.add('dragging');
  dragPlaceholder = dragEl.cloneNode(true);
  dragPlaceholder.removeAttribute('data-mid');
  dragPlaceholder.classList.remove('dragging');
  dragPlaceholder.classList.add('drag-placeholder');
  dragPlaceholder.querySelectorAll('.drag-handle,.tacts,button').forEach(function(el) { el.style.display = 'none'; });
  dragPlaceholder.style.pointerEvents = 'none';
  dragEl.parentNode.insertBefore(dragPlaceholder, dragEl.nextSibling);
  dragEl.style.position = 'relative';
  dragEl.style.zIndex = '100';
}

function dragMove(e) {
  if (!dragEl) return;
  e.preventDefault();
  var t = e.touches ? e.touches[0] : e;
  var dy = t.clientY - dragStartY;
  dragEl.style.transform = 'translateY(' + dy + 'px)';

  var cards = document.querySelectorAll('.mc:not(.dragging):not(.drag-placeholder)');
  var targetIdx = -1;
  cards.forEach(function(card, i) {
    var rect = card.getBoundingClientRect();
    var midY = rect.top + rect.height / 2;
    if (t.clientY > midY) targetIdx = i + 1;
    else if (targetIdx === -1) targetIdx = i;
  });
  if (targetIdx === -1) targetIdx = 0;

  var placeholders = document.querySelectorAll('.drag-placeholder');
  placeholders.forEach(function(p) {
    if (p !== dragPlaceholder) p.remove();
  });

  var ms = document.getElementById('memberBox');
  var allCards = ms.querySelectorAll('.mc');
  if (targetIdx >= allCards.length) {
    ms.appendChild(dragPlaceholder);
  } else {
    ms.insertBefore(dragPlaceholder, allCards[targetIdx]);
  }
}

function dragEnd(e) {
  if (!dragEl) return;
  dragEl.classList.remove('dragging');
  dragEl.style.transform = '';
  dragEl.style.position = '';
  dragEl.style.zIndex = '';

  /* 将拖拽元素插入到占位符位置 */
  var ph = document.querySelector('.drag-placeholder');
  if (ph) {
    ph.parentNode.insertBefore(dragEl, ph);
    ph.remove();
  }

  /* 读取最终 DOM 顺序 */
  var boxes = document.querySelectorAll('#memberBox .mc[data-mid]');
  var newOrder = [];
  boxes.forEach(function(b) { newOrder.push(b.getAttribute('data-mid')); });

  var newMembers = [];
  newOrder.forEach(function(id) {
    var m = data.members.find(function(x) { return x.id === id; });
    if (m) newMembers.push(m);
  });
  data.members = newMembers;
  save();
  render();
  toast('排序已更新');

  dragMid = null;
  dragEl = null;
  dragPlaceholder = null;
  dragInitialIdx = -1;
}

document.addEventListener('touchmove', function(e) { if (dragEl) dragMove(e); }, {passive: false});
document.addEventListener('mousemove', function(e) { if (dragEl) dragMove(e); });
document.addEventListener('touchend', function(e) { if (dragEl) dragEnd(e); });
document.addEventListener('mouseup', function(e) { if (dragEl) dragEnd(e); });

function toggleEditMode(mid) {
  editModeMid = (editModeMid === mid) ? null : mid;
  render();
}

/* 家庭图表页 */
function openFamilyPage() { document.getElementById('familyPage').classList.add('show'); renderChart(); }
function closeFamilyPage() { document.getElementById('familyPage').classList.remove('show'); }

function renderChart() {
  var c = document.getElementById('barsBox');
  c.innerHTML = '';
  var gAll = 0, gDone = 0;
  data.members.forEach(function(m) {
    var done = 0;
    m.tasks.forEach(function(t) { if (t.isDone) done++; });
    var total = m.tasks.length;
    gAll += total;
    gDone += done;
    var pct = total === 0 ? 0 : Math.round(done / total * 100);
    var row = document.createElement('div');
    row.className = 'br';
    row.innerHTML = '<div class="blb">' + m.name + '</div>'
      + '<div class="btk"><div class="bf" style="width:' + pct + '%"><span class="bft">' + done + '/' + total + '</span></div>'
      + '<span class="bpct">' + pct + '%</span></div>';
    c.appendChild(row);
  });
  document.getElementById('smT').innerText = gAll;
  document.getElementById('smD').innerText = gDone;
  document.getElementById('smP').innerText = (gAll === 0 ? '0%' : Math.round(gDone / gAll * 100) + '%');
  drawDonut(gDone, gAll - gDone);
}

function drawDonut(done, undone) {
  var cv = document.getElementById('donutC');
  var ctx = cv.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var w = 280, h = 210;
  cv.width = w * dpr;
  cv.height = h * dpr;
  cv.style.width = w + 'px';
  cv.style.height = h + 'px';
  ctx.scale(dpr, dpr);
  var cx = w / 2, cy = h / 2, r = 70, lw = 18;
  ctx.clearRect(0, 0, w, h);
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.lineWidth = lw;
  ctx.strokeStyle = '#E5E5EA';
  ctx.stroke();
  var total = done + undone;
  if (total > 0) {
    var endA = Math.PI * 2 * done / total - Math.PI / 2;
    ctx.beginPath();
    ctx.arc(cx, cy, r, -Math.PI / 2, endA);
    ctx.lineWidth = lw;
    ctx.strokeStyle = '#20A162';
    ctx.lineCap = 'round';
    ctx.stroke();
  }
  ctx.fillStyle = '#111';
  ctx.font = 'bold 28px -apple-system';
  ctx.textAlign = 'center';
  ctx.fillText(done + '/' + total, cx, cy + 2);
  ctx.fillStyle = '#888';
  ctx.font = '13px -apple-system';
  ctx.textAlign = 'center';
  ctx.fillText('完成数', cx, cy + 22);
}

/* 删除任务 */
function deleteTask(mid, tid) {
  var m = data.members.find(function(x) { return x.id === mid; });
  var t = m.tasks.find(function(x) { return x.id === tid; });
  if (t && t.pinned) { toast('置顶任务不可删除'); return; }
  if (!confirm('确定删除该任务？')) return;
  m.tasks = m.tasks.filter(function(t) { return t.id !== tid; });
  save(); render();
  toast('任务已删除');
}

/* 提醒 */
function openRemModal(mid, tid) {
  if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
  document.getElementById('rmMid').value = mid;
  document.getElementById('rmTid').value = tid;
  document.getElementById('rmTime').value = '';
  document.getElementById('remOv').classList.add('show');
}
function closeRemModal() { document.getElementById('remOv').classList.remove('show'); }
function saveReminder() {
  var mid = document.getElementById('rmMid').value;
  var tid = document.getElementById('rmTid').value;
  var v = document.getElementById('rmTime').value;
  if (!v) { alert('请选择提醒时间'); return; }
  var now = new Date();
  var p = v.split(':');
  var d = new Date(now.getFullYear(), now.getMonth(), now.getDate(), parseInt(p[0],10), parseInt(p[1],10), 0, 0);
  if (d <= now) d.setDate(d.getDate() + 1);
  var list = JSON.parse(localStorage.getItem('fc_rem') || '[]');
  list.push({mid:mid, tid:tid, time:d.getTime()});
  localStorage.setItem('fc_rem', JSON.stringify(list));
  closeRemModal();
  toast('提醒已设置 ⏰');
  if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
}
function checkReminders() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  var now = Date.now();
  var list = JSON.parse(localStorage.getItem('fc_rem') || '[]');
  var keep = [];
  list.forEach(function(r) {
    if (r.time <= now) {
      var mm = data.members.find(function(x) { return x.id === r.mid; });
      if (mm) {
        var tt = mm.tasks.find(function(x) { return x.id === r.tid; });
        if (tt) new Notification('照护提醒', { body: mm.name + ' 的任务：' + tt.title });
      }
    } else keep.push(r);
  });
  if (keep.length !== list.length) localStorage.setItem('fc_rem', JSON.stringify(keep));
}
setInterval(checkReminders, 30000);

init();
</script>
